<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muse Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Login */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .login-box {
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    padding: 40px;
    width: 340px;
    text-align: center;
  }

  .login-box h1 { font-size: 28px; margin-bottom: 8px; color: #fff; }
  .login-box p { color: #888; margin-bottom: 28px; font-size: 14px; }

  input[type="password"], input[type="text"], select {
    width: 100%;
    padding: 12px 16px;
    background: #0f0f13;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus { border-color: #7c3aed; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary { background: #7c3aed; color: #fff; width: 100%; margin-top: 12px; }
  .btn-primary:hover { background: #6d28d9; }
  .btn-icon { background: #2a2a3a; color: #e0e0e0; padding: 12px; border-radius: 50%; width: 48px; height: 48px; }
  .btn-icon:hover { background: #3a3a4a; }
  .btn-icon.active { background: #7c3aed; }
  .btn-play { background: #7c3aed; color: #fff; padding: 14px; border-radius: 50%; width: 56px; height: 56px; }
  .btn-play:hover { background: #6d28d9; }
  .btn-danger { background: #7f1d1d; color: #fca5a5; }
  .btn-danger:hover { background: #991b1b; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }

  .error-msg { color: #f87171; font-size: 13px; margin-top: 8px; min-height: 18px; }

  /* App layout */
  #app { display: none; flex-direction: column; min-height: 100vh; }

  header {
    background: #1a1a24;
    border-bottom: 1px solid #2a2a3a;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  header h1 { font-size: 20px; color: #fff; font-weight: 600; }

  .guild-selector { display: flex; align-items: center; gap: 10px; }
  .guild-selector label { font-size: 13px; color: #888; white-space: nowrap; }
  .guild-selector select { width: auto; padding: 8px 12px; font-size: 14px; }

  .logout-btn { background: none; border: 1px solid #2a2a3a; color: #888; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; }
  .logout-btn:hover { color: #e0e0e0; border-color: #3a3a4a; }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 0;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    padding: 24px;
    gap: 24px;
  }

  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
  }

  /* Player panel */
  .player-panel {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .now-playing {
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 16px;
  }

  .album-art {
    width: 180px;
    height: 180px;
    border-radius: 12px;
    object-fit: cover;
    background: #2a2a3a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .album-art img { width: 100%; height: 100%; border-radius: 12px; object-fit: cover; }

  .song-info { width: 100%; }
  .song-title { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .song-artist { font-size: 14px; color: #888; }

  .progress-bar-wrap { width: 100%; }
  .progress-times { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 6px; }
  .progress-bar { width: 100%; height: 4px; background: #2a2a3a; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #7c3aed; border-radius: 2px; transition: width 1s linear; }

  .controls { display: flex; align-items: center; gap: 12px; }

  /* Search */
  .search-panel {
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    padding: 20px;
  }

  .search-panel h2 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 14px; }

  .search-row { display: flex; gap: 8px; }
  .search-row input { flex: 1; }
  .search-row .btn { padding: 12px 18px; white-space: nowrap; }

  .channel-row { margin-top: 10px; }
  .channel-row label { font-size: 13px; color: #888; display: block; margin-bottom: 6px; }

  /* Queue panel */
  .queue-panel {
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .queue-panel h2 { font-size: 16px; font-weight: 600; color: #fff; }

  .queue-list { display: flex; flex-direction: column; gap: 6px; max-height: 480px; overflow-y: auto; }

  .queue-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: #0f0f13;
    border-radius: 8px;
    font-size: 13px;
  }

  .queue-thumb {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    object-fit: cover;
    background: #2a2a3a;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .queue-thumb img { width: 100%; height: 100%; border-radius: 6px; object-fit: cover; }

  .queue-info { flex: 1; min-width: 0; }
  .queue-name { color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .queue-meta { color: #555; font-size: 12px; margin-top: 2px; }

  .queue-empty { color: #555; font-size: 14px; text-align: center; padding: 20px 0; }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 100;
    max-width: 300px;
  }

  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { border-color: #7f1d1d; color: #fca5a5; }
  #toast.success { border-color: #14532d; color: #86efac; }

  .idle-msg { color: #555; font-size: 16px; }

  select option { background: #1a1a24; }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <h1>🎵 Muse</h1>
    <p>Enter your dashboard password</p>
    <input type="password" id="password-input" placeholder="Password" autocomplete="current-password">
    <button class="btn btn-primary" onclick="login()">Sign in</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>🎵 Muse</h1>
    <div class="guild-selector">
      <label>Server</label>
      <select id="guild-select" onchange="onGuildChange()">
        <option>Loading...</option>
      </select>
    </div>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </header>

  <main>
    <div class="player-panel">
      <!-- Now Playing -->
      <div class="now-playing" id="now-playing">
        <div class="album-art" id="album-art">🎵</div>
        <div class="song-info">
          <div class="song-title" id="song-title">Nothing playing</div>
          <div class="song-artist" id="song-artist">—</div>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-times">
            <span id="pos-current">0:00</span>
            <span id="pos-total">0:00</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        </div>
        <div class="controls">
          <button class="btn btn-icon" id="btn-pause" onclick="togglePause()" title="Pause / Resume">⏸</button>
          <button class="btn btn-play" onclick="skip()" title="Skip">⏭</button>
          <button class="btn btn-icon btn-danger btn-sm" onclick="stop()" title="Stop & disconnect">■</button>
        </div>
      </div>

      <!-- Search -->
      <div class="search-panel">
        <h2>Add to Queue</h2>
        <div class="search-row">
          <input type="text" id="search-input" placeholder="Song name or Spotify/YouTube URL" onkeydown="if(event.key==='Enter') addToQueue()">
          <button class="btn btn-primary" style="width:auto" onclick="addToQueue()">Add</button>
        </div>
        <div class="channel-row">
          <label>Voice channel</label>
          <select id="channel-select">
            <option value="">Select a server first</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Queue -->
    <div class="queue-panel">
      <h2>Queue</h2>
      <div class="queue-list" id="queue-list">
        <div class="queue-empty">Queue is empty</div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
  let token = localStorage.getItem('muse_token');
  let selectedGuildId = localStorage.getItem('muse_guild');
  let pollTimer = null;
  let currentStatus = null;

  // Init
  if (token) showApp();

  async function api(method, path, body) {
    const res = await fetch(path, {
      method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`,
      },
      body: body ? JSON.stringify(body) : undefined,
    });
    if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
    return res.json();
  }

  async function login() {
    const pw = document.getElementById('password-input').value;
    document.getElementById('login-error').textContent = '';
    try {
      const data = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({password: pw}),
      }).then(r => r.json());

      if (data.token) {
        token = data.token;
        localStorage.setItem('muse_token', token);
        showApp();
      } else {
        document.getElementById('login-error').textContent = 'Wrong password.';
      }
    } catch {
      document.getElementById('login-error').textContent = 'Connection error.';
    }
  }

  function logout() {
    token = null;
    localStorage.removeItem('muse_token');
    clearInterval(pollTimer);
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }

  async function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    await loadGuilds();
    startPolling();
  }

  async function loadGuilds() {
    try {
      const guilds = await api('GET', '/api/guilds');
      const sel = document.getElementById('guild-select');
      sel.innerHTML = guilds.map(g => `<option value="${g.id}">${g.name}</option>`).join('');

      if (selectedGuildId && guilds.find(g => g.id === selectedGuildId)) {
        sel.value = selectedGuildId;
      } else if (guilds.length > 0) {
        selectedGuildId = guilds[0].id;
        sel.value = selectedGuildId;
      }

      await loadChannels();
    } catch {}
  }

  async function loadChannels() {
    if (!selectedGuildId) return;
    try {
      const channels = await api('GET', `/api/guilds/${selectedGuildId}/channels`);
      const sel = document.getElementById('channel-select');
      if (channels.length === 0) {
        sel.innerHTML = '<option value="">No voice channels found</option>';
      } else {
        sel.innerHTML = channels.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
      }
    } catch {}
  }

  async function onGuildChange() {
    selectedGuildId = document.getElementById('guild-select').value;
    localStorage.setItem('muse_guild', selectedGuildId);
    await loadChannels();
    await poll();
  }

  function startPolling() {
    poll();
    pollTimer = setInterval(poll, 2000);
  }

  async function poll() {
    if (!selectedGuildId || !token) return;
    try {
      const data = await api('GET', `/api/guilds/${selectedGuildId}/status`);
      renderStatus(data);
    } catch {}
  }

  function renderStatus(data) {
    currentStatus = data;
    const isPlaying = data.status === 0;
    const isPaused = data.status === 1;
    const isIdle = data.status === 2 || !data.current;

    document.getElementById('btn-pause').textContent = isPlaying ? '⏸' : '▶';
    document.getElementById('btn-pause').classList.toggle('active', isPaused);

    if (data.current) {
      document.getElementById('song-title').textContent = data.current.title;
      document.getElementById('song-artist').textContent = data.current.artist || '—';

      const art = document.getElementById('album-art');
      if (data.current.thumbnailUrl) {
        art.innerHTML = `<img src="${data.current.thumbnailUrl}" alt="">`;
      } else {
        art.innerHTML = '🎵';
      }

      const pos = data.position || 0;
      const len = data.current.length || 1;
      document.getElementById('pos-current').textContent = fmtTime(pos);
      document.getElementById('pos-total').textContent = fmtTime(len);
      document.getElementById('progress-fill').style.width = `${Math.min(100, (pos / len) * 100)}%`;
    } else {
      document.getElementById('song-title').textContent = 'Nothing playing';
      document.getElementById('song-artist').textContent = '—';
      document.getElementById('album-art').innerHTML = '🎵';
      document.getElementById('pos-current').textContent = '0:00';
      document.getElementById('pos-total').textContent = '0:00';
      document.getElementById('progress-fill').style.width = '0%';
    }

    const queueList = document.getElementById('queue-list');
    if (!data.queue || data.queue.length === 0) {
      queueList.innerHTML = '<div class="queue-empty">Queue is empty</div>';
    } else {
      queueList.innerHTML = data.queue.map(s => `
        <div class="queue-item">
          <div class="queue-thumb">
            ${s.thumbnailUrl ? `<img src="${s.thumbnailUrl}" alt="">` : '🎵'}
          </div>
          <div class="queue-info">
            <div class="queue-name">${esc(s.title)}</div>
            <div class="queue-meta">${esc(s.artist)} · ${fmtTime(s.length)}</div>
          </div>
        </div>
      `).join('');
    }
  }

  async function addToQueue() {
    const query = document.getElementById('search-input').value.trim();
    const channelId = document.getElementById('channel-select').value;
    if (!query) { toast('Enter a song name or URL', 'error'); return; }
    if (!channelId) { toast('Select a voice channel', 'error'); return; }
    if (!selectedGuildId) { toast('Select a server', 'error'); return; }

    try {
      const res = await api('POST', `/api/guilds/${selectedGuildId}/play`, {query, channelId});
      if (res.error) { toast(res.error, 'error'); return; }
      document.getElementById('search-input').value = '';
      toast(`Added ${res.added} song${res.added !== 1 ? 's' : ''}`, 'success');
      await poll();
    } catch (e) {
      toast('Failed to add song', 'error');
    }
  }

  async function togglePause() {
    if (!selectedGuildId) return;
    try {
      const isPlaying = currentStatus?.status === 0;
      if (isPlaying) {
        await api('POST', `/api/guilds/${selectedGuildId}/pause`);
      } else {
        await api('POST', `/api/guilds/${selectedGuildId}/resume`);
      }
      await poll();
    } catch {}
  }

  async function skip() {
    if (!selectedGuildId) return;
    try {
      const res = await api('POST', `/api/guilds/${selectedGuildId}/skip`);
      if (res.error) { toast(res.error, 'error'); return; }
      await poll();
    } catch {}
  }

  async function stop() {
    if (!selectedGuildId) return;
    try {
      await api('POST', `/api/guilds/${selectedGuildId}/stop`);
      await poll();
    } catch {}
  }

  function fmtTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2, '0')}`;
  }

  function esc(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  let toastTimer;
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }

  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
